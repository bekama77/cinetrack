services:
  - type: web
    name: cinetrack
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn cinetrack.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: cinetrack.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://cinetrack.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: cinetrack-db
          property: connectionString

databases:
  - name: cinetrack-db
