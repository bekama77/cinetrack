{% extends "base.html" %}
{% block content %}<div class="d-flex justify-content-between align-items-center mb-3"><h1>My watchlist</h1><a class="btn btn-primary" href="{% url 'watchlists:watchentry-add' %}">Add entry</a></div>{% for entry in entries %}<div class="card mb-3"><div class="card-body"><h5>{{ entry.movie.title }}</h5><p>Status: {{ entry.get_status_display }}</p><a class="btn btn-sm btn-warning" href="{% url 'watchlists:watchentry-edit' entry.pk %}">Edit</a> <a class="btn btn-sm btn-danger" href="{% url 'watchlists:watchentry-delete' entry.pk %}">Delete</a></div></div>{% empty %}<p>No watchlist entries yet.</p>{% endfor %}{% endblock %}
