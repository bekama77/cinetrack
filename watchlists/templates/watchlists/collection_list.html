{% extends "base.html" %}
{% block content %}<div class="d-flex justify-content-between align-items-center mb-3"><h1>Collections</h1>{% if user.is_authenticated %}<a class="btn btn-primary" href="{% url 'watchlists:collection-create' %}">Create collection</a>{% endif %}</div>{% for collection in collections %}<div class="card mb-3"><div class="card-body"><h5>{{ collection.title }}</h5><p>{{ collection.description|truncatechars:100 }}</p><a class="btn btn-outline-primary" href="{% url 'watchlists:collection-detail' collection.slug %}">Open</a></div></div>{% empty %}<p>No public collections yet.</p>{% endfor %}{% endblock %}
